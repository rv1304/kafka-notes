spring:
kafka:
bootstrap-servers: localhost:9092
producer:
key-serializer: org.apache.kafka.common.serialization.StringSerializer
value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
# Best practices:
acks: all                    # Highest durability
retries: 3
max-block-ms: 5000
compression-type: snappy     # or zstd (better)
batch-size: 16384
linger-ms: 5                 # Small delay for better batching

consumer:
group-id: user-management-group
auto-offset-reset: earliest   # or latest
key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
properties:
spring.json.trusted.packages: com.pm.usermanagement.dto,com.pm.usermanagement.event
spring.json.type.mapping: responseDTO:com.pm.usermanagement.dto.responseDTO

# Advanced (good for production later)
listener:
concurrency: 3               # Number of consumer threads
ack-mode: MANUAL_IMMEDIATE   # or RECORD